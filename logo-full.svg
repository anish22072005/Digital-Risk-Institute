<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Institute of Digital Risk logo">
  <!-- Cube icon -->
  <polygon points="40,8 68,22 40,36 12,22" fill="#FF6B00"/>
  <polygon points="12,22 40,36 40,64 12,50" fill="#1A1A1A"/>
  <polygon points="68,22 40,36 40,64 68,50" fill="#2D2D2D"/>
  <polyline points="12,22 40,8 68,22" fill="none" stroke="#FF8C3A" stroke-width="1.2"/>
  <!-- Wordmark -->
  <text x="84" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#FF6B00" letter-spacing="2">INSTITUTE OF</text>
  <text x="84" y="50" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A" letter-spacing="1">Digital Risk</text>
  <!-- Thin underline accent -->
  <line x1="84" y1="57" x2="300" y2="57" stroke="#FF6B00" stroke-width="1.5"/>
